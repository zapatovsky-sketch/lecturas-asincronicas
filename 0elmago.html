<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Revelation - El Mago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'arcane-black': '#030005',
                        'electric-purple': '#9D00FF',
                        'neon-cyan': '#00F0FF',
                        'radioactive-green': '#CCFF00',
                        'deep-void': '#0B0114',
                    },
                    fontFamily: {
                        display: ['Orbitron', 'sans-serif'],
                        body: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow-spin': 'glow-spin 10s linear infinite',
                        'float': 'float 4s ease-in-out infinite',
                    },
                    keyframes: {
                        'glow-spin': {
                            '0%': { transform: 'rotate(0deg) scale(1)' },
                            '50%': { transform: 'rotate(180deg) scale(1.1)' },
                            '100%': { transform: 'rotate(360deg) scale(1)' },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030005;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .psychedelic-mesh {
            background: 
                radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 240, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(204, 255, 0, 0.05) 0%, transparent 60%);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glass-card {
            background: rgba(11, 1, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.2);
        }

        .neon-border-glow {
            position: relative;
        }

        .neon-border-glow::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #9D00FF, #00F0FF, #CCFF00, #9D00FF);
            z-index: -1;
            border-radius: inherit;
            animation: border-flow 6s linear infinite;
            background-size: 300% 300%;
            opacity: 0.5;
        }

        @keyframes border-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 240, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(157, 0, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .technical-decoration {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: rgba(0, 240, 255, 0.4);
            text-transform: uppercase;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            filter: contrast(1.1) brightness(1.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .img-container:hover img {
            transform: scale(1.02);
            filter: contrast(1.2) brightness(1.2) drop-shadow(0 0 20px rgba(157, 0, 255, 0.5));
        }
    </style>
</head>
<body class="font-body selection:bg-neon-cyan selection:text-arcane-black">

    <!-- Background Decorative Elements -->
    <div class="psychedelic-mesh"></div>
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-electric-purple opacity-10 rounded-full blur-[120px] animate-pulse-slow"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-neon-cyan opacity-10 rounded-full blur-[120px] animate-pulse-slow" style="animation-delay: 3s"></div>
    </div>

    <!-- Header -->
    <header class="relative z-50 pt-8 pb-4 px-6 flex flex-col items-center">
        <div class="technical-decoration mb-2 flex items-center gap-4">
            <span class="w-12 h-px bg-neon-cyan opacity-30"></span>
            INITIATING ARCANE REVELATION
            <span class="w-12 h-px bg-neon-cyan opacity-30"></span>
        </div>
        <div class="flex flex-col items-center group cursor-default">
            <h2 class="text-xs font-display tracking-[0.5em] text-neon-cyan uppercase opacity-70 transition-all group-hover:opacity-100 group-hover:tracking-[0.6em]">
                System Manifestation
            </h2>
            <div class="h-0.5 w-8 bg-radioactive-green mt-2 rounded-full transition-all group-hover:w-24"></div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="relative z-20 container mx-auto px-6 py-12 flex flex-col items-center justify-center min-h-[calc(100vh-160px)]">
        
        <!-- Grouping Container -->
        <div class="w-full max-w-md flex flex-col items-center gap-8 animate-float">
            
            <!-- Card Wrapper -->
            <div class="relative w-full glass-card p-2 rounded-xl overflow-hidden group">
                <!-- Scanline effect -->
                <div class="scanline"></div>
                
                <!-- Inner Neon Frame -->
                <div class="relative z-10 p-1 border border-white/5 rounded-lg overflow-hidden">
                    <div class="img-container relative rounded overflow-hidden">
                        <!-- THE IMAGE -->
                        <div class="relative z-20">
                            <img src='https://opal.google/board/blobs/38538ca9-a35e-4bb1-836b-dfbc0ec9ced6' alt='El Mago Tarot Card' class="shadow-2xl" />
                        </div>
                        
                        <!-- Overlay Gradients -->
                        <div class="absolute inset-0 z-30 pointer-events-none bg-gradient-to-t from-arcane-black/40 via-transparent to-transparent opacity-60"></div>
                    </div>
                </div>

                <!-- Decorative corner elements -->
                <div class="absolute top-4 left-4 w-4 h-4 border-t-2 border-l-2 border-neon-cyan/50 z-30"></div>
                <div class="absolute top-4 right-4 w-4 h-4 border-t-2 border-r-2 border-neon-cyan/50 z-30"></div>
                <div class="absolute bottom-4 left-4 w-4 h-4 border-b-2 border-l-2 border-neon-cyan/50 z-30"></div>
                <div class="absolute bottom-4 right-4 w-4 h-4 border-b-2 border-r-2 border-neon-cyan/50 z-30"></div>
            </div>

            <!-- Title Section -->
            <div class="text-center relative">
                <div class="absolute -inset-4 bg-electric-purple/10 blur-2xl rounded-full"></div>
                <h1 class="relative font-display text-5xl md:text-7xl font-black text-white text-glow tracking-tighter uppercase">
                    <span class="block text-radioactive-green text-sm tracking-[0.8em] font-normal mb-2 opacity-80">Arcano Mayor</span>
                    El Mago
                </h1>
                
                <!-- Technical Stats/Decorative Meta -->
                <div class="mt-6 flex justify-center items-center gap-6">
                    <div class="flex flex-col items-center">
                        <span class="technical-decoration !text-[0.5rem] opacity-50">Element</span>
                        <span class="text-[0.6rem] font-display text-neon-cyan">AIR / MERCURY</span>
                    </div>
                    <div class="w-px h-6 bg-white/10"></div>
                    <div class="flex flex-col items-center">
                        <span class="technical-decoration !text-[0.5rem] opacity-50">Value</span>
                        <span class="text-[0.6rem] font-display text-neon-cyan">I - THE BEGINNING</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scroll/Interaction Hint -->
        <div class="mt-16 flex flex-col items-center gap-2 opacity-40 animate-pulse">
            <div class="text-[0.5rem] font-display tracking-[0.3em] text-white">REVELATION COMPLETE</div>
            <div class="w-px h-12 bg-gradient-to-b from-neon-cyan to-transparent"></div>
        </div>
    </main>

    <!-- Aesthetic Floating Particles (JS generated for performance/cleanliness) -->
    <div id="particle-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <script>
        // Simple script to generate a few "technical" floating nodes
        const container = document.getElementById('particle-container');
        for (let i = 0; i < 15; i++) {
            const dot = document.createElement('div');
            dot.style.position = 'absolute';
            dot.style.width = Math.random() * 2 + 'px';
            dot.style.height = dot.style.width;
            dot.style.backgroundColor = Math.random() > 0.5 ? '#00F0FF' : '#9D00FF';
            dot.style.top = Math.random() * 100 + '%';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.borderRadius = '50%';
            dot.style.opacity = Math.random() * 0.5;
            dot.style.filter = 'blur(1px)';
            dot.style.transition = 'all 10s ease-in-out';
            container.appendChild(dot);
            
            setInterval(() => {
                dot.style.top = Math.random() * 100 + '%';
                dot.style.left = Math.random() * 100 + '%';
            }, 10000);
        }
    </script>
</body>
</html>
