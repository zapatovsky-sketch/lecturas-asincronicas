<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB_DESTINOS: SECTOR NO CARTOGRAFIADO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syncopate:wght@700&display=swap');

        :root {
            --bg-color: #050505;
            --primary: #d4af37;
            --cyber: #00ff41;
            --industrial: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle, #111 1px, transparent 1px);
            background-size: 25px 25px;
            color: #e0e0e0;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .error-container {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid var(--industrial);
            box-shadow: 0 0 50px rgba(0, 0, 0, 1), inset 0 0 20px rgba(0, 255, 65, 0.02);
            max-width: 500px;
            width: 100%;
            padding: 45px;
            position: relative;
            text-align: center;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            color: var(--cyber);
            font-size: 26px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .sys-log {
            font-size: 12px;
            color: #555;
            text-align: left;
            margin-bottom: 20px;
            border-left: 2px solid var(--industrial);
            padding-left: 10px;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            color: #aaa;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 11px;
            color: var(--primary);
            text-transform: uppercase;
        }

        input {
            background: #0a0a0a;
            border: 1px solid var(--industrial);
            color: white;
            padding: 14px;
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { 
            border-color: var(--cyber);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
        }

        button {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 18px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            font-family: 'Syncopate', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .back-link {
            display: block;
            margin-top: 30px;
            font-size: 11px;
            color: #444;
            text-decoration: none;
            letter-spacing: 1px;
        }
        
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="sys-log">
            [SYS_ALERT]: DATA_NOT_FOUND<br>
            [LOCATION]: UNKNOWN_SECTOR<br>
            [STATUS]: WAITING_FOR_INPUT...
        </div>

        <h1>COORDENADA VACÍA</h1>
        
        <p>Has intentado acceder a un código que no existe en el registro actual del Laboratorio. Sin embargo, en la Arqueniería, <span style="color:var(--primary)">el vacío es solo espacio por construir</span>.</p>

        <form action="https://formspree.io/f/mnjwqqez" method="POST">
            <div class="input-group">
                <label>Código solicitado</label>
                <input type="text" name="clave_fallida" placeholder="ej: amor, abundancia..." required>
            </div>
            
            <div class="input-group">
                <label>Correo de enlace</label>
                <input type="email" name="email" placeholder="tu@frecuencia.com" required>
            </div>

            <input type="hidden" name="_subject" value="NUEVA SOLICITUD DE DECODIFICACIÓN">

            <button type="submit">SOLICITAR CARTOGRAFÍA</button>
        </form>

        <a href="index.html" class="back-link">> REINTENTAR SECUENCIA EN PORTAL</a>
    </div>

</body>
</html>
