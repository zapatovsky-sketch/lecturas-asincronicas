<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB_DESTINOS: ESTADO DEL SISTEMA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syncopate:wght@700&display=swap');

        :root {
            --bg-color: #050505;
            --primary: #d4af37;
            --alert: #ff3333;
            --industrial: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #e0e0e0;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .status-box {
            background: rgba(10, 10, 10, 0.98);
            border: 2px solid var(--industrial);
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
            max-width: 600px;
            width: 100%;
            padding: 50px;
            position: relative;
            text-align: center;
        }

        .status-box::before {
            content: 'ALERTA DE CAPACIDAD';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--alert);
            color: black;
            padding: 2px 15px;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .status-indicator {
            font-size: 18px;
            color: var(--alert);
            border: 1px solid var(--alert);
            display: inline-block;
            padding: 10px 30px;
            margin: 20px 0;
            background: rgba(255, 51, 51, 0.05);
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0px var(--alert); }
            50% { box-shadow: 0 0 15px var(--alert); }
            100% { box-shadow: 0 0 0px var(--alert); }
        }

        p {
            font-size: 16px;
            line-height: 1.8;
            color: #aaa;
        }

        .highlight {
            color: var(--primary);
            font-weight: bold;
        }

        .footer-sig {
            margin-top: 40px;
            font-size: 11px;
            color: #444;
            border-top: 1px solid var(--industrial);
            padding-top: 20px;
            text-transform: uppercase;
        }

        .btn-waitlist {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            border: 1px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s;
        }
