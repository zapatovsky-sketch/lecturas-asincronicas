<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El Loco :: Carta Inmersiva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #030303;
      background-image: radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.1) 0%, transparent 50%);
      min-height: 100vh;
      overflow-x: hidden;
      font-family: monospace;
      color: #e0e0e0;
    }
    .card {
      background: rgba(10, 10, 10, 0.85);
      border: 2px solid #2a2a2a;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(255, 0, 77, 0.3);
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }
    .title {
      font-size: 2rem;
      color: #39ff14;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .freq {
      font-style: italic;
      color: #ff004d;
      margin-bottom: 20px;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #999;
    }
    img {
      max-width: 100%;
      border: 6px solid #ff004d;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    audio {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Imagen central (del 0elloco) -->
    <img src="https://opal.google/board/blobs/0d25707e-64f2-48f3-a093-5b6bd00f3278" alt="El Loco">

    <!-- Audio ritual integrado -->
    <audio controls>
      <source src="https://opal.google/board/blobs/4609c1ae-55c5-4648-bc5a-2b0ba22a7390" type="audio/mpeg">
      Tu navegador no soporta audio ritual
    </audio>

    <!-- Narrativa mínima -->
    <h1 class="title">El Loco</h1>
    <p class="freq">frecuencia: caos fértil :: órbita desviada</p>
    <div class="footer">LAB_DESTINOS // OPERADOR: ZAPATOVSKY</div>
  </div>

</body>
</html>
