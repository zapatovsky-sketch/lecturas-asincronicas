<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Manifestation - El Emperador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#030303',
                        electric: '#6d28d9',
                        neon: '#0ea5e9',
                        plasma: '#f43f5e',
                        circuit: 'rgba(34, 211, 238, 0.1)',
                    },
                    fontFamily: {
                        display: ['Syncopate', 'sans-serif'],
                        technical: ['Space Grotesk', 'sans-serif'],
                        body: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { 'box-shadow': '0 0 20px rgba(109, 40, 217, 0.4)' },
                            '100%': { 'box-shadow': '0 0 50px rgba(14, 165, 233, 0.6)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #1a1033 0%, #030303 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #ffffff;
        }

        .psychedelic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(109, 40, 217, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .card-container::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #6d28d9, transparent, #0ea5e9, transparent, #f43f5e);
            z-index: -1;
            border-radius: 1.5rem;
            opacity: 0.5;
            filter: blur(8px);
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(14, 165, 233, 0.8);
        }

        .technical-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="font-body selection:bg-neon selection:text-white">

    <div class="psychedelic-bg"></div>
    <div class="grain"></div>
    <div class="technical-grid fixed inset-0 z-[-1]"></div>

    <!-- Header -->
    <header class="relative z-10 pt-8 pb-4 text-center px-6">
        <nav class="inline-flex items-center space-x-4 border-b border-white/10 pb-2">
            <span class="w-2 h-2 bg-plasma rounded-full animate-pulse"></span>
            <p class="font-display text-[10px] sm:text-xs tracking-[0.4em] uppercase text-neon/80">
                Tarot Card Manifestation
            </p>
            <span class="w-2 h-2 bg-plasma rounded-full animate-pulse"></span>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center justify-center min-h-[calc(100vh-120px)] p-6 lg:p-12 overflow-hidden">
        
        <!-- Decorative Elements -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] pointer-events-none opacity-20">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full border border-neon/20 rounded-full animate-pulse-slow"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 border border-electric/30 rounded-full animate-pulse" style="animation-duration: 4s;"></div>
        </div>

        <div class="max-w-4xl w-full flex flex-col items-center">
            
            <!-- Arcane Title Above -->
            <div class="mb-8 text-center group">
                <span class="font-technical text-plasma text-sm tracking-widest block mb-2 opacity-70 group-hover:opacity-100 transition-opacity">IV • THE AUTHORITY</span>
                <h1 class="font-display text-4xl md:text-6xl lg:text-7xl font-bold tracking-tighter text-white uppercase leading-none drop-shadow-2xl">
                    <span class="inline-block hover:scale-105 transition-transform duration-300">El</span>
                    <span class="block bg-gradient-to-r from-neon via-white to-plasma bg-clip-text text-transparent italic hover:skew-x-2 transition-transform duration-300">
                        Emperador
                    </span>
                </h1>
            </div>

            <!-- Image Presentation -->
            <div class="relative card-container animate-float w-full max-w-md aspect-[2/3] lg:max-w-lg">
                <div class="absolute -top-4 -right-4 bg-void/80 border border-neon/50 px-4 py-1 backdrop-blur-md rounded-sm z-20">
                    <p class="font-technical text-[10px] text-neon uppercase tracking-widest">Signal Locked</p>
                </div>
                
                <div class="absolute -bottom-4 -left-4 bg-void/80 border border-plasma/50 px-4 py-1 backdrop-blur-md rounded-sm z-20">
                    <p class="font-technical text-[10px] text-plasma uppercase tracking-widest">Protocol 004</p>
                </div>

                <div class="w-full h-full rounded-2xl overflow-hidden border border-white/20 shadow-2xl relative group">
                    <!-- The Artwork -->
                    <div class="w-full h-full overflow-hidden">
                        <img src='https://opal.google/board/blobs/5e6e8480-a5bb-413e-a1a8-46f921d0b4cd' alt='El Emperador Tarot Card' class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-out" />
                    </div>
                    
                    <!-- Overlay Effects -->
                    <div class="absolute inset-0 bg-gradient-to-t from-void/60 via-transparent to-transparent opacity-60 group-hover:opacity-30 transition-opacity"></div>
                    <div class="absolute inset-0 bg-neon/10 mix-blend-overlay"></div>
                </div>
            </div>

            <!-- Technical Data Footer of Image -->
            <div class="mt-12 flex flex-col items-center text-center space-y-4 max-w-lg">
                <div class="h-[1px] w-32 bg-gradient-to-r from-transparent via-neon to-transparent"></div>
                <p class="font-body text-white/60 text-sm md:text-base leading-relaxed tracking-wide px-4">
                    The structure of universal order manifesting through sovereign consciousness. 
                    A pillar of <span class="text-neon font-semibold">Technical Precision</span> and <span class="text-plasma font-semibold">Divine Rule</span>.
                </p>
                <div class="flex space-x-6">
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] font-technical uppercase text-white/40 tracking-widest">Domain</span>
                        <span class="text-xs font-display text-white">Material Realm</span>
                    </div>
                    <div class="w-[1px] h-8 bg-white/10"></div>
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] font-technical uppercase text-white/40 tracking-widest">Essence</span>
                        <span class="text-xs font-display text-white">Sovereignty</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Interactive Script for micro-parallax effect -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.card-container');
            if(!container) return;
            
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            
            container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) translateY(-20px)`;
        });

        // Reset transform on mouse out
        document.addEventListener('mouseleave', () => {
            const container = document.querySelector('.card-container');
            if(container) {
                container.style.transform = `rotateY(0deg) rotateX(0deg) translateY(0px)`;
            }
        });
    </script>
</body>
</html>
