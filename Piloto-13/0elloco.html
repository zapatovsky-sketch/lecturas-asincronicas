<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Revelation - El Loco</title>
    <!-- Google Fonts: Orbitron for industrial/technical feel, Space Grotesque for modern clarity -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesque:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#030303',
                        electric: '#00f2ff',
                        cyber: '#9d00ff',
                        plasma: '#ff00ea',
                        radioactive: '#39ff14'
                    },
                    fontFamily: {
                        technical: ['Orbitron', 'sans-serif'],
                        modern: ['Space Grotesque', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        'pulse-slow': {
                            '0%, 100%': { opacity: 1 },
                            '50%': { opacity: 0.7 },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        'glow': {
                            '0%': { 'box-shadow': '0 0 20px rgba(157, 0, 255, 0.3), 0 0 40px rgba(0, 242, 255, 0.2)' },
                            '100%': { 'box-shadow': '0 0 40px rgba(157, 0, 255, 0.6), 0 0 80px rgba(0, 242, 255, 0.4)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030303;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Technical Grid Overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(45deg, #9d00ff, transparent, #00f2ff);
            z-index: -1;
            border-radius: inherit;
            opacity: 0.5;
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.8), 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .media-container img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            filter: saturate(1.2) contrast(1.1);
        }

        /* Scanline effect */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.2);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="font-modern text-zinc-100 flex flex-col items-center justify-center p-4 md:p-8">

    <!-- Technical Background Elements -->
    <div class="grid-overlay"></div>
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyber/10 rounded-full blur-[120px] animate-pulse-slow"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-electric/10 rounded-full blur-[120px] animate-pulse-slow" style="animation-delay: 2s;"></div>
    </div>

    <!-- Header -->
    <header class="relative z-10 mb-12 text-center w-full max-w-4xl">
        <div class="inline-flex items-center gap-4 px-4 py-1 border-x border-electric/30">
            <span class="w-2 h-2 bg-electric rounded-full animate-ping"></span>
            <span class="font-technical text-[10px] md:text-xs tracking-[0.4em] uppercase text-electric/80 font-bold">
                Your Arcane Revelation
            </span>
            <span class="w-2 h-2 bg-electric rounded-full animate-ping"></span>
        </div>
        <div class="mt-2 h-px w-32 bg-gradient-to-r from-transparent via-electric/50 to-transparent mx-auto"></div>
    </header>

    <!-- Main Content Area -->
    <main class="relative z-10 w-full max-w-2xl flex flex-col items-center">
        
        <!-- Card Display Section -->
        <div class="relative group animate-float">
            
            <!-- Tech Frame Accents -->
            <div class="absolute -top-6 -left-6 w-12 h-12 border-t-2 border-l-2 border-cyber/60"></div>
            <div class="absolute -top-6 -right-6 w-12 h-12 border-t-2 border-r-2 border-electric/60"></div>
            <div class="absolute -bottom-6 -left-6 w-12 h-12 border-b-2 border-l-2 border-electric/60"></div>
            <div class="absolute -bottom-6 -right-6 w-12 h-12 border-b-2 border-r-2 border-cyber/60"></div>

            <!-- The Artwork Container -->
            <div class="glass-card p-2 md:p-4 rounded-xl overflow-hidden animate-glow">
                <div class="relative overflow-hidden rounded-lg shadow-2xl">
                    <!-- Scanline Effect -->
                    <div class="scanline"></div>
                    
                    <!-- Provided Media Image -->
                    <div class="media-container">
                        <img src='https://opal.google/board/blobs/0d25707e-64f2-48f3-a093-5b6bd00f3278' alt='El Loco Tarot Artwork' class="transition-transform duration-700 group-hover:scale-105" />
                    </div>
                    
                    <!-- Technical HUD Overlay -->
                    <div class="absolute top-2 left-2 pointer-events-none">
                        <div class="text-[8px] font-technical text-electric/40">SYS_ANALYSIS: ACTIVE</div>
                    </div>
                    <div class="absolute bottom-2 right-2 pointer-events-none">
                        <div class="text-[8px] font-technical text-cyber/40">ARCANA_VER_2.0.4</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Title Section -->
        <div class="mt-12 text-center">
            <div class="mb-2">
                <span class="font-technical text-[10px] tracking-[0.5em] text-plasma uppercase opacity-60">Designation</span>
            </div>
            <h1 class="font-technical text-5xl md:text-7xl font-black text-white tracking-tighter uppercase leading-none">
                <span class="block transform transition-all duration-500 hover:tracking-widest cursor-default text-glow">
                    El Loco
                </span>
            </h1>
            <div class="mt-6 flex items-center justify-center gap-6">
                <div class="h-[1px] w-12 md:w-24 bg-gradient-to-r from-transparent to-electric"></div>
                <div class="w-3 h-3 rotate-45 border border-electric flex items-center justify-center">
                    <div class="w-1 h-1 bg-electric"></div>
                </div>
                <div class="h-[1px] w-12 md:w-24 bg-gradient-to-l from-transparent to-electric"></div>
            </div>
            
            <!-- Description snippet for aesthetic completeness -->
            <p class="mt-8 max-w-sm mx-auto text-zinc-400 font-modern text-sm md:text-base leading-relaxed tracking-wide opacity-80 italic">
                The zero point of infinite potential. A digital ghost stepping into the void of the network, carrying only the weight of destiny.
            </p>
        </div>

    </main>

    <!-- Interactive Elements (JS) -->
    <script>
        // Optional subtle interactivity for movement
        const card = document.querySelector('.glass-card');
        const container = document.body;

        container.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        container.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
        });

        container.addEventListener('mouseleave', () => {
            card.style.transition = 'all 0.5s ease';
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
