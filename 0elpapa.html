<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Revelation - El Papa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#030008',
                        deepSpace: '#0a0514',
                        neonPurple: '#bc13fe',
                        electricCyan: '#00f3ff',
                        radioactive: '#39ff14',
                        arcaneGold: '#ffb800',
                    },
                    fontFamily: {
                        display: ['Orbitron', 'sans-serif'],
                        technical: ['Rajdhani', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'scan': 'scan 8s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(1deg)' },
                        },
                        scan: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(1000%)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030008;
            background-image: 
                radial-gradient(circle at 50% 50%, #1a0b2e 0%, #030008 100%),
                url("https://www.transparenttextures.com/patterns/stardust.png");
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(20, 10, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            box-shadow: 0 0 40px rgba(188, 19, 254, 0.1);
        }

        .card-glow {
            filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.4));
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-glow:hover {
            filter: drop-shadow(0 0 30px rgba(188, 19, 254, 0.6));
            transform: scale(1.02);
        }

        .neon-text-cyan {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8), 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .neon-text-purple {
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.8), 0 0 20px rgba(188, 19, 254, 0.4);
        }

        /* Scanline effect overlay */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 243, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 50;
            animation: scan 10s linear infinite;
        }

        .geometric-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-gray-100 font-technical antialiased selection:bg-electricCyan selection:text-void">

    <!-- Ambient Overlay Effects -->
    <div class="scanline"></div>
    <svg class="geometric-bg" width="100%" height="100%">
        <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(0, 243, 255, 0.2)" stroke-width="0.5"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#grid)" />
        <circle cx="50%" cy="50%" r="40%" fill="none" stroke="rgba(188, 19, 254, 0.1)" stroke-width="2" stroke-dasharray="20 10" />
    </svg>

    <!-- Header Section -->
    <header class="relative z-10 pt-8 pb-4 px-6 flex flex-col items-center">
        <div class="flex items-center space-x-3 mb-2">
            <div class="h-px w-8 bg-electricCyan/50"></div>
            <span class="uppercase tracking-[0.4em] text-[10px] md:text-xs font-bold text-electricCyan neon-text-cyan">Arcane Revelation</span>
            <div class="h-px w-8 bg-electricCyan/50"></div>
        </div>
        <p class="text-[9px] md:text-[10px] text-gray-500 font-display tracking-widest uppercase opacity-60">System Protocol: Manifestation_Active</p>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center justify-center min-h-[calc(100vh-140px)] px-4 py-8">
        
        <!-- Arcane Mayor Title Container -->
        <div class="mb-8 text-center animate-pulse-slow">
            <h1 class="font-display font-black text-5xl md:text-8xl lg:text-9xl uppercase tracking-tighter italic text-white neon-text-purple">
                El Papa
            </h1>
            <div class="flex justify-center items-center mt-2 space-x-4">
                <span class="h-1 w-12 bg-radioactive"></span>
                <span class="text-radioactive font-display text-sm tracking-widest uppercase">Major Arcana V</span>
                <span class="h-1 w-12 bg-radioactive"></span>
            </div>
        </div>

        <!-- Artwork Frame -->
        <div class="relative group max-w-lg w-full perspective-1000">
            <!-- Decorative Tech Frames -->
            <div class="absolute -inset-4 border border-electricCyan/20 rounded-xl pointer-events-none opacity-50 group-hover:opacity-100 transition-opacity duration-700"></div>
            <div class="absolute -inset-1 bg-gradient-to-tr from-neonPurple via-electricCyan to-radioactive rounded-2xl blur-md opacity-20 group-hover:opacity-40 transition-opacity duration-700"></div>
            
            <!-- The Card -->
            <div class="relative glass-panel rounded-xl p-4 md:p-6 animate-float flex flex-col items-center">
                <div class="w-full overflow-hidden rounded-lg shadow-2xl border border-white/10 relative">
                    <!-- Technical UI elements overlay on image corners -->
                    <div class="absolute top-2 left-2 w-4 h-4 border-t-2 border-l-2 border-electricCyan z-20"></div>
                    <div class="absolute top-2 right-2 w-4 h-4 border-t-2 border-r-2 border-electricCyan z-20"></div>
                    <div class="absolute bottom-2 left-2 w-4 h-4 border-b-2 border-l-2 border-electricCyan z-20"></div>
                    <div class="absolute bottom-2 right-2 w-4 h-4 border-b-2 border-r-2 border-electricCyan z-20"></div>

                    <!-- Input Image -->
                    <div class="card-glow">
                        <img src='https://opal.google/board/blobs/7ac67e00-fb71-4885-9584-b6632c9991ac' alt='El Papa - Tarot Card Artwork' class="w-full h-auto object-cover transform transition-transform duration-700 group-hover:scale-110" />
                    </div>
                </div>

                <!-- Technical Footer of Card Container -->
                <div class="mt-6 w-full border-t border-white/5 pt-4 flex justify-between items-end">
                    <div class="text-[10px] font-mono text-gray-500 uppercase leading-none">
                        <div class="mb-1 text-electricCyan/60">Decryption Complete</div>
                        <div>Origin: Neural_Aether_05</div>
                    </div>
                    <div class="flex flex-col items-end">
                        <div class="text-[10px] text-neonPurple/80 font-bold uppercase tracking-widest">Esoteric Interface</div>
                        <div class="flex space-x-1 mt-1">
                            <div class="w-1 h-1 bg-radioactive"></div>
                            <div class="w-3 h-1 bg-radioactive/30"></div>
                            <div class="w-1 h-1 bg-radioactive"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Floating Decorative Text -->
            <div class="hidden lg:block absolute -left-20 top-1/2 -rotate-90 text-[10px] tracking-[1em] uppercase text-gray-600 font-display">
                Universal Hierarchy
            </div>
            <div class="hidden lg:block absolute -right-20 top-1/2 rotate-90 text-[10px] tracking-[1em] uppercase text-gray-600 font-display">
                Spiritual Authority
            </div>
        </div>

        <!-- Call to Action / Interaction Prompt -->
        <div class="mt-12 group cursor-pointer">
            <div class="relative overflow-hidden px-8 py-3 rounded-full border border-electricCyan/30 text-electricCyan font-display tracking-widest text-xs uppercase hover:bg-electricCyan hover:text-void transition-all duration-300">
                <span class="relative z-10">Ascend Consciousness</span>
                <div class="absolute inset-0 bg-electricCyan translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
            </div>
        </div>
    </main>

    <!-- Subtle interactive particle effect logic (Internal Script) -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.body.style.backgroundImage = `
                radial-gradient(circle at ${x * 100}% ${y * 100}%, #1a0b2e 0%, #030008 100%),
                url("https://www.transparenttextures.com/patterns/stardust.png")
            `;
        });

        // Add a simple entrance animation for the card
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-panel');
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px) scale(0.95)';
            
            setTimeout(() => {
                card.style.transition = 'all 1s cubic-bezier(0.2, 0.8, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0) scale(1)';
            }, 300);
        });
    </script>
</body>
</html>
