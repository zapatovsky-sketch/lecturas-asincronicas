<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Revelation - La Justicia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#030014',
                        electric: {
                            cyan: '#00f2ff',
                            purple: '#7000ff',
                            pink: '#ff00c8',
                            green: '#39ff14'
                        }
                    },
                    fontFamily: {
                        technical: ['Orbitron', 'sans-serif'],
                        modern: ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(112, 0, 255, 0.2), 0 0 10px rgba(112, 0, 255, 0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(0, 242, 255, 0.6), 0 0 40px rgba(112, 0, 255, 0.4)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030014;
            color: #ffffff;
            overflow-x: hidden;
        }

        .bg-mesh {
            background: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.1) 50%
            ), linear-gradient(
                90deg,
                rgba(255, 0, 0, 0.02),
                rgba(0, 255, 0, 0.01),
                rgba(0, 0, 255, 0.02)
            );
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }

        .card-container img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            filter: saturate(1.2) contrast(1.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-frame {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .glass-frame::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(0, 242, 255, 0.3),
                transparent 40%
            );
            animation: rotate 6s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.8),
                         0 0 20px rgba(112, 0, 255, 0.5);
        }

        .tech-border {
            clip-path: polygon(
                0 15px, 15px 0, 
                calc(100% - 15px) 0, 100% 15px, 
                100% calc(100% - 15px), calc(100% - 15px) 100%, 
                15px 100%, 0 calc(100% - 15px)
            );
        }
    </style>
</head>
<body class="font-modern">
    <div class="bg-mesh"></div>
    <div class="scanlines"></div>

    <!-- Header Section -->
    <header class="relative z-10 pt-8 pb-4 px-6 flex flex-col items-center">
        <div class="flex items-center space-x-3 mb-2">
            <div class="h-[1px] w-12 bg-gradient-to-r from-transparent to-electric-cyan"></div>
            <span class="font-technical text-[10px] tracking-[0.4em] text-electric-cyan uppercase opacity-80">System.Initialize.Arcane</span>
            <div class="h-[1px] w-12 bg-gradient-to-l from-transparent to-electric-cyan"></div>
        </div>
        <h2 class="font-technical text-sm md:text-base tracking-[0.2em] text-white opacity-60 uppercase">
            Your Arcane Revelation
        </h2>
    </header>

    <!-- Main Content Area -->
    <main class="relative z-10 flex flex-col items-center justify-center min-h-[calc(100vh-140px)] px-6 py-8">
        
        <!-- Card Display Logic -->
        <div class="w-full max-w-md lg:max-w-lg flex flex-col items-center group">
            
            <!-- Arcano Title (Top) -->
            <div class="mb-8 text-center">
                <h1 class="font-technical text-4xl md:text-6xl font-black text-white tracking-tighter uppercase neon-text transition-all duration-700 group-hover:tracking-widest">
                    La Justicia
                </h1>
                <div class="mt-2 h-[2px] w-24 bg-electric-cyan mx-auto shadow-[0_0_10px_#00f2ff]"></div>
            </div>

            <!-- Artwork Image -->
            <div class="relative animate-float">
                <!-- Decorative Tech Elements -->
                <div class="absolute -top-4 -left-4 w-12 h-12 border-t-2 border-l-2 border-electric-cyan opacity-40"></div>
                <div class="absolute -bottom-4 -right-4 w-12 h-12 border-b-2 border-r-2 border-electric-purple opacity-40"></div>
                
                <div class="glass-frame tech-border p-1 md:p-2 shadow-2xl transition-all duration-500 group-hover:scale-[1.03] group-hover:shadow-[0_0_50px_rgba(112,0,255,0.3)]">
                    <div class="card-container bg-void tech-border overflow-hidden">
                        <img src='https://opal.google/board/blobs/cee26850-0625-42d1-b926-191e929a7fa6' alt='media_1' />
                    </div>
                </div>
                
                <!-- Circular Data Orbs -->
                <div class="absolute -right-6 top-1/4 w-3 h-3 bg-electric-cyan rounded-full animate-pulse shadow-[0_0_15px_#00f2ff]"></div>
                <div class="absolute -left-6 bottom-1/4 w-3 h-3 bg-electric-purple rounded-full animate-pulse shadow-[0_0_15px_#7000ff] delay-700"></div>
            </div>

            <!-- Metadata Info (Bottom Subtle Detail) -->
            <div class="mt-12 flex flex-col items-center space-y-4 opacity-40">
                <div class="flex space-x-8 text-[10px] font-technical tracking-widest uppercase">
                    <div class="flex items-center space-x-2">
                        <span class="w-2 h-2 bg-electric-cyan"></span>
                        <span>Equilibrium</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="w-2 h-2 bg-electric-purple"></span>
                        <span>Truth</span>
                    </div>
                </div>
                <p class="max-w-xs text-center text-xs leading-relaxed font-modern italic">
                    The scales tip in favor of cosmic alignment. Technical precision meets ethereal destiny.
                </p>
            </div>

        </div>

    </main>

    <!-- Side Decorative Accents -->
    <div class="fixed left-6 top-1/2 -translate-y-1/2 hidden lg:flex flex-col space-y-12 opacity-30">
        <div class="h-24 w-[1px] bg-gradient-to-b from-transparent via-electric-cyan to-transparent"></div>
        <div class="vertical-text font-technical text-[8px] tracking-[1em] rotate-180" style="writing-mode: vertical-rl;">PROTOCOL_ALPHA_7</div>
        <div class="h-24 w-[1px] bg-gradient-to-b from-transparent via-electric-purple to-transparent"></div>
    </div>
    
    <div class="fixed right-6 top-1/2 -translate-y-1/2 hidden lg:flex flex-col space-y-12 opacity-30">
        <div class="h-24 w-[1px] bg-gradient-to-b from-transparent via-electric-pink to-transparent"></div>
        <div class="vertical-text font-technical text-[8px] tracking-[1em]" style="writing-mode: vertical-rl;">DESTINY_MANIFEST</div>
        <div class="h-24 w-[1px] bg-gradient-to-b from-transparent via-electric-green to-transparent"></div>
    </div>

    <script>
        // Simple interactive parallax effect for the card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.animate-float');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body>
</html>
