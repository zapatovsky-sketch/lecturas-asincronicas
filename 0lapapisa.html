<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Revelation - La Papisa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        arcane: {
                            black: '#020205',
                            deep: '#08051a',
                            neon: '#00f2ff',
                            purple: '#7000ff',
                            pink: '#ff00e5',
                        },
                    },
                    fontFamily: {
                        display: ['"Syncopate"', 'sans-serif'],
                        title: ['"Archivo Black"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            'from': { 'box-shadow': '0 0 20px #7000ff, 0 0 40px #00f2ff' },
                            'to': { 'box-shadow': '0 0 40px #ff00e5, 0 0 80px #7000ff' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020205;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Abstract Background Elements */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        .technical-border {
            position: relative;
        }

        .technical-border::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            pointer-events: none;
        }

        .technical-border::after {
            content: 'TYPE: ARCANO_MAYOR // ID: 002';
            position: absolute;
            bottom: -25px;
            right: 0;
            font-family: 'Syncopate', sans-serif;
            font-size: 8px;
            color: #00f2ff;
            letter-spacing: 2px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5), 0 0 20px rgba(112, 0, 255, 0.3);
        }

        /* Scanline effect */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 242, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body class="font-body selection:bg-arcane-neon selection:text-arcane-black min-h-screen flex flex-col items-center">

    <div class="bg-mesh"></div>
    <div class="scanline"></div>

    <!-- Header Section -->
    <header class="w-full pt-8 pb-4 px-6 flex justify-between items-center z-20">
        <div class="flex items-center space-x-3">
            <div class="w-2 h-2 bg-arcane-neon rounded-full animate-pulse"></div>
            <span class="font-display text-[10px] uppercase tracking-[0.4em] text-arcane-neon/80">Arcane Revelation System</span>
        </div>
        <div class="text-[10px] font-display text-white/40 tracking-widest hidden sm:block">
            EST. 2024 // HIGH VOLTAGE
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col items-center justify-center w-full max-w-6xl px-6 py-12 space-y-12 z-10">
        
        <!-- Card Identification Group -->
        <div class="flex flex-col items-center space-y-8 w-full">
            
            <!-- Title -->
            <div class="relative group">
                <div class="absolute -inset-2 bg-gradient-to-r from-arcane-purple via-arcane-neon to-arcane-pink opacity-20 blur-xl group-hover:opacity-40 transition duration-1000"></div>
                <h1 class="relative font-title text-6xl md:text-8xl lg:text-9xl text-center uppercase tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white via-white to-white/20 drop-shadow-2xl">
                    La Papisa
                </h1>
                <div class="flex justify-center items-center mt-2 space-x-4">
                    <div class="h-[1px] w-12 bg-arcane-neon"></div>
                    <span class="font-display text-xs tracking-[0.5em] text-arcane-neon text-glow">THE HIGH PRIESTESS</span>
                    <div class="h-[1px] w-12 bg-arcane-neon"></div>
                </div>
            </div>

            <!-- Image Presentation Container -->
            <div class="relative max-w-md w-full animate-float">
                <!-- Technical Aesthetic Elements -->
                <div class="absolute -top-6 -left-6 w-12 h-12 border-t-2 border-l-2 border-arcane-neon opacity-50"></div>
                <div class="absolute -bottom-6 -right-6 w-12 h-12 border-b-2 border-r-2 border-arcane-pink opacity-50"></div>
                
                <!-- Main Artwork Frame -->
                <div class="technical-border glass-card p-2 rounded-sm shadow-2xl overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-tr from-arcane-purple/20 to-transparent pointer-events-none"></div>
                    
                    <!-- Provided Media Element -->
                    <div class="relative overflow-hidden">
                        <img src='https://opal.google/board/blobs/60d46534-1199-4dd1-80f4-b974902da677' alt='media_1' class="w-full h-auto object-cover filter contrast-125 brightness-110 transition duration-700 group-hover:scale-105" />
                    </div>

                    <!-- Overlay decorative UI -->
                    <div class="absolute top-4 left-4 font-display text-[8px] text-white/50 tracking-tighter flex flex-col">
                        <span>DATA_SYNC: ACTIVE</span>
                        <span>FREQ: 432HZ</span>
                    </div>
                </div>
                
                <!-- Decorative Glow behind image -->
                <div class="absolute -z-10 inset-0 bg-arcane-purple/20 blur-[100px] rounded-full scale-150"></div>
            </div>

        </div>

        <!-- Descriptive Metadata Block (Technical/Esoteric Vibe) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl pt-12 border-t border-white/5">
            <div class="flex flex-col space-y-2 p-4 glass-card rounded-lg">
                <span class="font-display text-[9px] text-arcane-neon tracking-widest uppercase opacity-70">Core Aspect</span>
                <p class="text-white/80 font-light text-sm uppercase tracking-wider">The Veil of Subconscious</p>
            </div>
            <div class="flex flex-col space-y-2 p-4 glass-card rounded-lg border-b-2 border-arcane-purple">
                <span class="font-display text-[9px] text-arcane-neon tracking-widest uppercase opacity-70">Technical State</span>
                <p class="text-white/80 font-light text-sm uppercase tracking-wider">Equilibrium Manifested</p>
            </div>
            <div class="flex flex-col space-y-2 p-4 glass-card rounded-lg">
                <span class="font-display text-[9px] text-arcane-neon tracking-widest uppercase opacity-70">Frequency</span>
                <p class="text-white/80 font-light text-sm uppercase tracking-wider">Intuitive Resonance</p>
            </div>
        </div>

    </main>

    <!-- Interactive Background Elements (Particles simulation feel) -->
    <div class="fixed top-1/4 left-10 w-32 h-32 bg-arcane-pink/5 rounded-full blur-[60px] animate-pulse-slow"></div>
    <div class="fixed bottom-1/4 right-10 w-48 h-48 bg-arcane-neon/5 rounded-full blur-[80px] animate-pulse-slow" style="animation-delay: 2s;"></div>

</body>
</html>
